name: CI

# Triggers:
#   push / pull_request — standard code-review gate on the main branch.
#   schedule            — weekly cron exists ONLY to run the SCA job
#                         periodically even when no code is committed.
#                         All other jobs guard against the schedule trigger
#                         via `if: github.event_name != 'schedule'`.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Every Monday 06:00 UTC

# Least-privilege default. Jobs that need additional permissions declare them
# explicitly; this keeps fork PRs safe (they cannot elevate beyond read).
permissions:
  contents: read

# Cancel superseded runs on feature branches to save runner minutes.
# Never cancel in-progress runs on main to avoid interrupted post-merge work.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # build
  # No `needs`. First node in the dependency graph.
  # Wrapper-JAR checksum validation is handled by setup-gradle (validate-wrappers)
  # in this and every other Gradle job, so a tampered wrapper fails fast wherever
  # it would run — not just here.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Do not run on the weekly schedule — that trigger exists only for SCA.
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      # AGP 9.2 / Gradle 9 require JDK 17 at runtime.
      # compileOptions { sourceCompatibility = JavaVersion.VERSION_11 } sets the
      # bytecode *target*, not the runtime JDK — 17 is still required here.
      # cache: gradle is intentionally NOT set; setup-gradle below owns caching.
      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      # setup-gradle manages the Gradle home cache end-to-end.
      # No additional actions/cache steps are added anywhere in this file —
      # duplicate caches would cause cache-key collisions and wasted storage.
      # PRs (including from forks) only read the cache; only pushes to main
      # are allowed to write, preventing cache poisoning from untrusted code.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          # Validate the Gradle wrapper JAR checksum in every job that runs the
          # wrapper. lint / static-analysis / detekt have no `needs: build`, so
          # they must validate independently rather than trust the build job.
          validate-wrappers: true

      # Operator builds inject the real default-server config via this secret; open/F-Droid
      # builds (and fork PRs, which never receive secrets) resolve blank → the in-app placeholder
      # (see :data:server DefaultServer / issue #56). Scoped to THIS step only (not job-level) to
      # minimize exposure — it is read via a Gradle ValueSource/env, never echoed.
      # SECURITY: relies on `pull_request` withholding secrets from forks. Do NOT switch this
      # workflow to `pull_request_target` — that would expose the secret to untrusted fork code.
      - name: Assemble debug APK
        env:
          VPNIS_DEFAULT_SERVER_CONFIG: ${{ secrets.VPNIS_DEFAULT_SERVER_CONFIG }}
        run: ./gradlew assembleDebug

  # ────────────────────────────────────────────────────────────────────────────
  # test
  # needs: [build] — explicit sequencing decision: run JVM unit tests only
  # after a successful assemble. Prevents spending runner minutes on test
  # compilation when the production build is already broken.
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'schedule'
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          # Validate the Gradle wrapper JAR checksum in every job that runs the
          # wrapper. lint / static-analysis / detekt have no `needs: build`, so
          # they must validate independently rather than trust the build job.
          validate-wrappers: true

      # Use the `test` lifecycle task, not `testDebugUnitTest`. The AGP variant task
      # `testDebugUnitTest` only compiles pure-JVM modules (vpnis.jvm.library, e.g.
      # :core:domain / :data:fake / :data:server) — it never runs their `test` task, so their
      # unit tests would silently not gate (issue #99). `gradle test` aggregates every module's
      # unit test tasks (Android debug+release unit tests AND pure-JVM `test`), covering all
      # current and future modules without enumerating them.
      - name: Run unit tests
        run: ./gradlew test

      # Upload even when tests fail so the report is always available for triage.
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # changes (native paths filter)
  # Cheap gate for the expensive native-build job (#72). The gomobile bind of
  # Xray-core + NDK build of hev takes 5–15 min, so we only run it when native
  # inputs actually change. Implemented with a plain `git diff` (no third-party
  # action to vet) so it honours the repo's pinned-SHA / minimal-dependency ethos.
  # ────────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect native changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name != 'schedule'
    outputs:
      native: ${{ steps.filter.outputs.native }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          # Full history so the base..HEAD diff below can be computed.
          fetch-depth: 0

      # Emits native=true when any Go / JNI / native-build input changed, or when
      # the base commit is unavailable (new branch / force push) — fail safe by
      # rebuilding rather than silently skipping.
      - name: Filter native paths
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "native=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$base" HEAD \
              | grep -qE '^(\.gitmodules|data/vpn/libXray|data/vpn/src/main/jni/|data/vpn/src/buildNative/|data/vpn/src/default/|data/vpn/build\.gradle\.kts|build-logic/convention/src/main/kotlin/AndroidCommon\.kt|\.github/workflows/ci\.yml)'; then
            echo "native=true" >> "$GITHUB_OUTPUT"
          else
            echo "native=false" >> "$GITHUB_OUTPUT"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # native-build (#72)
  # Builds the two native artifacts on demand:
  #   XrayCore.aar — gomobile bind of the pinned SaeedDev94/libXray submodule
  #   libhev*.so   — NDK build of hev-socks5-tunnel (via :data:vpn ndkBuild)
  # Gated on `changes.outputs.native` so it is skipped on non-native PRs (that
  # skip is what keeps the normal critical path — build/test/lint — un-doubled;
  # per #72 cycle-2 the `build` job intentionally does NOT `needs: native-build`).
  # The whole toolchain (Go, gomobile, NDK r29) is pinned to ADR-0001 values.
  # First real exercise of the toolchain — see ADR 0001 §Consequences.
  # ────────────────────────────────────────────────────────────────────────────
  native-build:
    name: Native Build (gomobile AAR + hev .so)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: github.event_name != 'schedule' && needs.changes.outputs.native == 'true'
    needs: [changes]
    env:
      # Single source of truth mirrors ADR 0001 / AndroidCommon.kt. Keep in sync.
      GO_VERSION: '1.26.3'
      NDK_VERSION: '29.0.14206865'
      GOMOBILE_VERSION: 'v0.0.0-20260520154334-0e4426e1883d'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          # gomobile binds the libXray submodule; hev's Android.mk pulls its own
          # transitive submodules — both required, so recurse.
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      # Go module/build cache keyed on the pinned libXray go.sum. This is the
      # primary speedup on reruns (Xray-core's dependency graph is large); the
      # AAR itself is not cached — the `changes` gate already skips this whole
      # job when native inputs are unchanged (AAR-output cache = follow-up).
      # gomobile itself is installed by buildXrayCore.sh at the pinned version.
      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: data/vpn/libXray/go.sum

      # r29 is the NDK of the adopted recipe; must equal AndroidCommon.kt's pin so
      # gomobile and AGP ndkBuild produce ABI-compatible artifacts. r29 currently
      # ships on the sdkmanager canary channel (--channel=3), matching the adopted
      # recipe's buildGo.sh. sdkmanager path resolved dynamically because the
      # runner image's cmdline-tools dir name is not guaranteed to be `latest`.
      - name: Install Android NDK ${{ env.NDK_VERSION }}
        run: |
          sdkmanager="$(find "$ANDROID_HOME/cmdline-tools" -name sdkmanager -type f | head -1)"
          if [ -z "$sdkmanager" ]; then echo "sdkmanager not found" >&2; exit 1; fi
          yes | "$sdkmanager" --install "ndk;${NDK_VERSION}" --channel=3 2>&1 | tail -5
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      # Turn a cryptic gomobile "NDK not found" into an obvious path failure.
      - name: Verify NDK
        run: |
          echo "NDK at: $ANDROID_NDK_HOME"
          test -f "$ANDROID_NDK_HOME/source.properties" || { echo "NDK missing at $ANDROID_NDK_HOME" >&2; exit 1; }

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          validate-wrappers: true

      # XrayCore.aar via gomobile (throwaway wrapper module — see the script).
      - name: Build XrayCore.aar (gomobile bind)
        run: bash data/vpn/buildXrayCore.sh

      # T-6: Assert the libXray submodule is at its pinned SHA before compiling
      # against the AAR it produced. This guarantees that what gomobile bound
      # matches the source the project has pinned — a mismatch would mean either
      # the submodule drifted or buildXrayCore.sh used a different tree.
      # NOTE: this is the SaeedDev94/libXray *submodule* commit (f6ce612…), which is
      # a DIFFERENT repo from the SaeedDev94/Xray *recipe* commit (7effa2b8…, ADR-0001
      # line 37). ADR line 38's "submodule at that commit" wording conflates the two;
      # the authoritative value is the actual data/vpn/libXray pin recorded in epic #44
      # (PR #95: "submodule data/vpn/libXray … f6ce612").
      - name: Assert libXray submodule at pinned SHA
        run: |
          EXPECTED="f6ce61228b5630f7bcf3c3c9a19d7e1db50b88d1"
          # rev-parse yields the clean 40-hex SHA with no submodule-status prefix
          # char (avoids `tr`/awk parsing of the leading ' '/'-'/'+'/'U' marker).
          ACTUAL=$(git -C data/vpn/libXray rev-parse HEAD)
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "libXray submodule SHA mismatch:" >&2
            echo "  expected: $EXPECTED" >&2
            echo "  actual:   $ACTUAL" >&2
            echo "Update the submodule pin or the ADR to keep them in sync." >&2
            exit 1
          fi
          echo "libXray submodule SHA verified: $ACTUAL"

      # T-6: Compile :data:vpn with the real XrayCore.aar (just built above).
      # This verifies that RealLibxrayApi and LibXrayCoreImpl compile against the
      # AAR and that the gomobile .so libs are packaged into the debug AAR.
      # assembleDebug (not assembleRelease) — no R8/signing, faster, sufficient
      # to prove the native seam links and the .so is extracted by AGP's AAR transform.
      # The hev .so (ndkBuild) is also produced by this same Gradle invocation.
      - name: Compile :data:vpn against XrayCore.aar + package .so (assembleDebug)
        run: ./gradlew :data:vpn:assembleDebug -Pvpnis.buildNative=true

      - name: Upload native artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: native-artifacts
          path: |
            data/vpn/libs/XrayCore.aar
            data/vpn/build/outputs/aar/*.aar
          if-no-files-found: warn
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # lint
  # NO `needs` — explicit decision: Android Lint performs its own compilation
  # pass independently of assembleDebug (it drives the AGP lint task directly).
  # Running it in parallel with the build job reduces total wall-clock time and
  # surfaces lint errors earlier without any correctness risk.
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          # Validate the Gradle wrapper JAR checksum in every job that runs the
          # wrapper. lint / static-analysis / detekt have no `needs: build`, so
          # they must validate independently rather than trust the build job.
          validate-wrappers: true

      - name: Run Android Lint
        run: ./gradlew lintDebug

      - name: Upload Lint reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lint-reports
          # Glob captures both lint-results-debug.html and lint-results-debug.xml across all modules.
          path: "**/build/reports/lint-results-*.*"
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # static-analysis
  # NO `needs` — explicit decision: ktlint reads raw source files and does not
  # invoke the Kotlin compiler, so it runs safely in parallel with the build job
  # for faster overall CI feedback.
  # BLOCKING gate: ktlintCheck exits 1 on any style violation (ignoreFailures =
  # false in the vpnis.ktlint convention plugin). No continue-on-error here —
  # a ktlint violation must turn this job red while all other jobs stay green.
  # ────────────────────────────────────────────────────────────────────────────
  static-analysis:
    name: ktlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          # Validate the Gradle wrapper JAR checksum in every job that runs the
          # wrapper. lint / static-analysis / detekt have no `needs: build`, so
          # they must validate independently rather than trust the build job.
          validate-wrappers: true

      # Blocking: no continue-on-error. A style violation exits 1 and fails the job.
      - name: Run ktlint (blocking gate)
        run: ./gradlew ktlintCheck

      - name: Upload ktlint reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ktlint-reports
          path: "**/build/reports/ktlint/"
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # detekt
  # NO `needs`: detekt reads source files and runs independently.
  # REPORTING-ONLY (non-blocking): `continue-on-error: true` on the Gradle step
  # means detekt findings do not fail the pipeline. The intent is to collect a
  # baseline before enforcing. Remove continue-on-error to promote to a gate.
  #
  # permissions.security-events: write is required to push SARIF to GitHub Code
  # Scanning. Fork PRs do not receive this permission, so the upload step is
  # also guarded with continue-on-error so it silently no-ops on forks or when
  # Advanced Security is unavailable.
  # ────────────────────────────────────────────────────────────────────────────
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          # Validate the Gradle wrapper JAR checksum in every job that runs the
          # wrapper. lint / static-analysis / detekt have no `needs: build`, so
          # they must validate independently rather than trust the build job.
          validate-wrappers: true

      # Non-blocking: findings are collected but do not fail CI at this stage.
      - name: Run detekt (reporting-only)
        run: ./gradlew detekt
        continue-on-error: true

      # Always upload the artifact so reports are available even when detekt found issues.
      - name: Upload detekt reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: detekt-reports
          # Captures detekt.sarif plus any per-variant SARIF files across all modules.
          path: "**/build/reports/detekt/"
          retention-days: 7

      # Collect every module's detekt SARIF into one directory so Code Scanning receives
      # findings from ALL modules (:app, :core:*, :data:*, :design:*, :feature:*), not just
      # :app. `cp --parents` preserves each file's module path so the copies stay unique
      # (every module emits its own detekt.sarif). upload-sarif accepts a directory and
      # uploads all *.sarif within it recursively.
      - name: Collect detekt SARIF (all modules)
        if: always()
        run: |
          mkdir -p build/detekt-sarif
          find . -path '*/build/reports/detekt/*.sarif' -exec cp --parents {} build/detekt-sarif/ \;

      # Push SARIF to GitHub Code Scanning for inline PR annotations.
      # continue-on-error: true — silently no-ops when:
      #   - no SARIF was generated (detekt failed before writing any)
      #   - Advanced Security / Code Scanning is not enabled on the repo
      #   - the job runs in a fork PR context (no security-events: write token)
      - name: Upload detekt SARIF to GitHub Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3.36.3
        with:
          sarif_file: build/detekt-sarif

  # ────────────────────────────────────────────────────────────────────────────
  # sca (Supply-Chain Analysis)
  # Runs ONLY on pull_request and the weekly schedule — not on direct pushes
  # to main (no dependency manifest changes happen without a PR anyway, and
  # avoiding redundant runs on main keeps costs down).
  # NON-BLOCKING: continue-on-error: true while the project establishes a clean
  # OSV baseline. Promote to blocking by removing continue-on-error.
  #
  # permissions.security-events: write — needed for SARIF upload to Code
  # Scanning. Fork PRs degrade gracefully because the SARIF upload step is
  # independently guarded with continue-on-error.
  # ────────────────────────────────────────────────────────────────────────────
  sca:
    name: Supply-Chain Analysis (OSV)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      # Scan the full repository recursively for known vulnerabilities in
      # dependency manifests and lock files. Non-blocking while baselining.
      # This composite action passes `scan-args` straight to the osv-scanner
      # binary (it exposes no other inputs), so the SARIF format and output
      # file are requested via CLI flags here rather than a dedicated input.
      - name: Run OSV-Scanner (non-blocking)
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --format=sarif
            --output=results.sarif
            --recursive
            ./

      # Upload SARIF for inline PR annotations. Silently no-ops when:
      #   - OSV-Scanner did not emit a SARIF file (no manifest found, or it failed)
      #   - Advanced Security is not enabled on the repo
      #   - Fork PR context has no security-events: write permission
      - name: Upload OSV-Scanner SARIF to GitHub Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3.36.3
        with:
          sarif_file: results.sarif
